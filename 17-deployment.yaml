apiVersion: v1
kind: Deployment
metadata:
  name: deployment-demo
  labels:
    app: roboshop
    environment: dev
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: roboshop
      environment: dev
      tier: frontend
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx 
spec:
  type: ClusterIP
  selector:   
     app: roboshop
     environment: dev    

  ports:
    - protocol: TCP 
      port: 80
      targetPort: 80  
      # nodePort: 30080

  