apiVersion: v1
kind: ReplicaSet
metadata:
  name: replicaset-demo
  labels:
    app: roboshop
    environment: dev
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: roboshop
      environment: dev
      tier: frontend
  template:
    metadata:
      labels:
        app: roboshop
        environment: dev
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx